<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AITradeX - 用户注册</title>
  <style>
    :root {
      --color-primary: #409eff;
      --color-primary-dark: #337ecc;
      --color-primary-light: #66b1ff;
      --color-success: #67c23a;
      --color-warning: #e6a23c;
      --color-danger: #f56c6c;
      --color-info: #909399;
      --color-text-primary: #303133;
      --color-text-regular: #606266;
      --color-text-secondary: #909399;
      --color-text-placeholder: #c0c4cc;
      --color-border-base: #dcdfe6;
      --color-border-light: #e4e7ed;
      --color-border-lighter: #ebeef5;
      --color-border-extra-light: #f2f6fc;
      --color-bg: #ffffff;
      --color-bg-page: #f5f7fa;
      --color-bg-overlay: #ffffff;
      --border-radius-base: 4px;
      --border-radius-small: 2px;
      --border-radius-circle: 50%;
      --box-shadow-base: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
      --box-shadow-light: 0 2px 8px 0 rgba(0, 0, 0, 0.06);
      --font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
      --transition-duration: 0.3s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: var(--font-family);
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .register-wrapper {
      width: 100%;
      max-width: 1060px;
      min-height: 680px;
      display: flex;
      background: var(--color-bg);
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .register-left {
      flex: 0 0 420px;
      background: linear-gradient(135deg, #409eff 0%, #337ecc 100%);
      color: white;
      padding: 60px 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .register-left::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
      animation: pulse 15s linear infinite;
    }

    @keyframes pulse {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .register-left-content {
      position: relative;
      z-index: 1;
    }

    .register-left h1 {
      font-size: 36px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    .register-left p {
      font-size: 16px;
      line-height: 1.8;
      opacity: 0.9;
      margin-bottom: 40px;
    }

    .register-benefits {
      list-style: none;
    }

    .register-benefits li {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      font-size: 15px;
    }

    .register-benefits li::before {
      content: "✓";
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      font-size: 12px;
      flex-shrink: 0;
    }

    .register-right {
      flex: 1;
      padding: 50px 50px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow-y: auto;
    }

    .register-header {
      margin-bottom: 30px;
    }

    .register-header h2 {
      font-size: 28px;
      color: var(--color-text-primary);
      font-weight: 600;
      margin-bottom: 12px;
    }

    .register-header p {
      color: var(--color-text-secondary);
      font-size: 14px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group.full-width {
      grid-column: span 2;
    }

    .form-label {
      display: block;
      font-size: 14px;
      color: var(--color-text-regular);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-label .required {
      color: var(--color-danger);
      margin-left: 2px;
    }

    .form-input-wrapper {
      position: relative;
    }

    .form-input-wrapper .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-placeholder);
      font-size: 16px;
      z-index: 1;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      border: 1px solid var(--color-border-base);
      border-radius: var(--border-radius-base);
      outline: none;
      transition: all var(--transition-duration);
      font-family: var(--font-family);
    }

    .form-input.has-icon {
      padding-left: 42px;
    }

    .form-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 2px rgba(64, 158, 255, 0.1);
    }

    .form-input::placeholder {
      color: var(--color-text-placeholder);
    }

    .form-hint {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-top: 6px;
      line-height: 1.5;
    }

    .btn-register {
      width: 100%;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 500;
      color: white;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
      border: none;
      border-radius: var(--border-radius-base);
      cursor: pointer;
      transition: all var(--transition-duration);
      font-family: var(--font-family);
      box-shadow: 0 4px 12px rgba(64, 158, 255, 0.3);
      margin-top: 10px;
    }

    .btn-register:hover {
      background: linear-gradient(135deg, var(--color-primary-light) 0%, var(--color-primary) 100%);
      box-shadow: 0 6px 16px rgba(64, 158, 255, 0.4);
      transform: translateY(-1px);
    }

    .btn-register:active {
      transform: translateY(0);
    }

    .btn-register:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      color: var(--color-danger);
      font-size: 13px;
      margin-top: 8px;
      display: none;
      padding: 8px 12px;
      background: rgba(245, 108, 108, 0.1);
      border-radius: var(--border-radius-base);
      border-left: 3px solid var(--color-danger);
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      color: var(--color-success);
      font-size: 13px;
      margin-top: 8px;
      display: none;
      padding: 8px 12px;
      background: rgba(103, 194, 58, 0.1);
      border-radius: var(--border-radius-base);
      border-left: 3px solid var(--color-success);
    }

    .success-message.show {
      display: block;
    }

    .login-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--color-text-secondary);
    }

    .login-link a {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 500;
      margin-left: 4px;
      transition: color var(--transition-duration);
    }

    .login-link a:hover {
      color: var(--color-primary-dark);
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      font-size: 12px;
      color: var(--color-text-placeholder);
    }

    .footer a {
      color: var(--color-text-secondary);
      text-decoration: none;
      margin: 0 8px;
      transition: color var(--transition-duration);
    }

    .footer a:hover {
      color: var(--color-primary);
    }

    .loading {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .register-wrapper {
        flex-direction: column;
        max-width: 480px;
      }

      .register-left {
        flex: 0 0 auto;
        padding: 40px 30px;
      }

      .register-left h1 {
        font-size: 28px;
      }

      .register-left p {
        font-size: 14px;
        margin-bottom: 20px;
      }

      .register-left li {
        font-size: 14px;
        margin-bottom: 14px;
      }

      .register-right {
        padding: 40px 30px;
      }

      .register-header h2 {
        font-size: 24px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .form-group.full-width {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>
  <div class="register-wrapper">
    <div class="register-left">
      <div class="register-left-content">
        <h1>加入 AITradeX</h1>
        <p>创建您的账户，开始智能量化交易之旅</p>
        <ul class="register-benefits">
          <li>免费试用所有高级功能</li>
          <li>实时市场数据分析</li>
          <li>AI驱动的交易策略</li>
          <li>专业的客户支持团队</li>
        </ul>
      </div>
    </div>

    <div class="register-right">
      <div class="register-header">
        <h2>用户注册</h2>
        <p>请填写以下信息创建您的账号</p>
      </div>

      <form id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="username">
              用户名<span class="required">*</span>
            </label>
            <div class="form-input-wrapper">
              <span class="input-icon">👤</span>
              <input
                type="text"
                id="username"
                class="form-input has-icon"
                placeholder="请输入用户名 (2-30个字符)"
                autocomplete="username"
                required
              >
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="nickName">
              昵称
            </label>
            <div class="form-input-wrapper">
              <span class="input-icon">✎</span>
              <input
                type="text"
                id="nickName"
                class="form-input has-icon"
                placeholder="请输入昵称 (选填)"
              >
            </div>
          </div>
        </div>

        <div class="form-group full-width">
          <label class="form-label" for="email">
            邮箱
          </label>
          <div class="form-input-wrapper">
            <span class="input-icon">✉</span>
            <input
              type="email"
              id="email"
              class="form-input has-icon"
              placeholder="请输入邮箱 (选填)"
            >
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="password">
              密码<span class="required">*</span>
            </label>
            <div class="form-input-wrapper">
              <span class="input-icon">🔒</span>
              <input
                type="password"
                id="password"
                class="form-input has-icon"
                placeholder="请输入密码 (6-30个字符)"
                autocomplete="new-password"
                required
              >
            </div>
            <div class="form-hint">密码长度必须在6-30个字符之间</div>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword">
              确认密码<span class="required">*</span>
            </label>
            <div class="form-input-wrapper">
              <span class="input-icon">🔐</span>
              <input
                type="password"
                id="confirmPassword"
                class="form-input has-icon"
                placeholder="请再次输入密码"
                autocomplete="new-password"
                required
              >
            </div>
          </div>
        </div>

        <div id="errorMsg" class="error-message"></div>
        <div id="successMsg" class="success-message"></div>

        <button type="submit" class="btn-register" id="registerBtn">
          注 册
        </button>
      </form>

      <div class="login-link">
        已有账号？<a href="/login">立即登录</a>
      </div>

      <div class="footer">
        <a href="#">用户协议</a>
        <a href="#">隐私政策</a>
        <a href="#">帮助中心</a>
        <br>
        © 2026 AITradeX · 智能量化交易系统
      </div>
    </div>
  </div>

  <script>
    const registerForm = document.getElementById('registerForm');
    const usernameInput = document.getElementById('username');
    const nickNameInput = document.getElementById('nickName');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const registerBtn = document.getElementById('registerBtn');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = usernameInput.value.trim();
      const nickName = nickNameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!username) {
        showError('请输入用户名');
        return;
      }

      if (username.length < 2 || username.length > 30) {
        showError('用户名长度必须在2-30个字符之间');
        return;
      }

      if (!password) {
        showError('请输入密码');
        return;
      }

      if (password.length < 6 || password.length > 30) {
        showError('密码长度必须在6-30个字符之间');
        return;
      }

      if (password !== confirmPassword) {
        showError('两次输入的密码不一致');
        return;
      }

      setLoading(true);

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username: username,
            nickName: nickName,
            email: email,
            password: password,
            confirmPassword: confirmPassword
          })
        });

        const data = await response.json();

        if (data.code === 200) {
          showSuccess('注册成功！即将跳转到登录页面...');
          setTimeout(() => {
            window.location.href = '/login';
          }, 1500);
        } else {
          showError(data.msg || '注册失败');
        }
      } catch (error) {
        showError('网络错误，请稍后重试');
      } finally {
        setLoading(false);
      }
    });

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.classList.add('show');
      successMsg.classList.remove('show');
      setTimeout(() => {
        errorMsg.classList.remove('show');
      }, 5000);
    }

    function showSuccess(message) {
      successMsg.textContent = message;
      successMsg.classList.add('show');
      errorMsg.classList.remove('show');
    }

    function setLoading(loading) {
      registerBtn.disabled = loading;
      registerBtn.innerHTML = loading
        ? '<span class="loading"></span>注册中...'
        : '注 册';
    }

    const inputs = [usernameInput, nickNameInput, emailInput, passwordInput, confirmPasswordInput];
    inputs.forEach(input => {
      input.addEventListener('input', () => {
        errorMsg.classList.remove('show');
      });
    });
  </script>
</body>
</html>
